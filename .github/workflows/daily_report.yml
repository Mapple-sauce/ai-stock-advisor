name: 📊 每日收盘PDF报告
on:
  schedule:
    # 交易日 09:00 UTC = 17:00 北京时间 (收盘后)
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: actions/setup-python@main
        with:
          python-version: "3.12"
      - name: 安装依赖
        run: pip install -r requirements.txt fpdf2
      - name: 安装中文字体
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk 2>&1 | tail -3
      - name: 生成每日PDF报告
        run: python main.py report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
      - name: 上传PDF报告
        uses: actions/upload-artifact@main
        with:
          name: daily-report
          path: reports/
