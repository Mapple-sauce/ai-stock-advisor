name: Manual Run
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 运行模式
        required: true
        default: all
        type: choice
        options:
          - all
          - buy
          - sell
          - scan
          - low
          - mom
          - hunt
          - report
          - optimize
      stock_code:
        description: 分析代码 (仅 analyze 模式)
        required: false
        default: ""
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run ${{ inputs.mode }}
        run: |
          if [ "${{ inputs.mode }}" = "analyze" ] || [ "${{ inputs.mode }}" = "分析" ]; then
            CODE="${{ inputs.stock_code }}"
            if [ -z "$CODE" ]; then
              echo "Using first stock from STOCK_LIST"
              CODE=$(echo "$STOCK_LIST" | cut -d',' -f1)
            fi
            python main.py analyze "$CODE"
          else
            python main.py ${{ inputs.mode }}
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
